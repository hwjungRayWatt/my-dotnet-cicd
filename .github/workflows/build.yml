name: .NET Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest   # WPF는 Windows에서만 빌드 가능!

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: .NET 설치
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 빌드
        run: dotnet build TEST/TEST.csproj   # ← 여기 경로 맞춤

      - name: 빌드 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: TEST/bin/