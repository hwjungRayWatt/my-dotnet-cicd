name: GitHub Actions

on:
  push:
    branches: [ "main" ]   # main 브랜치에 Push할 때 자동 실행

jobs:
  build:
    runs-on: windows-latest   # WPF는 Windows에서만 빌드 가능!

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: .NET 설치          # GitHub 서버는 매번 새로 켜지므로 필수!
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 빌드
        run: dotnet build TEST/TEST.csproj

      - name: 패키지 생성
        run: |
          mkdir output
          Copy-Item -Recurse TEST/bin/Debug/* output/
          Compress-Archive -Path output/* -DestinationPath output/patch.zip

      - name: 패키지 검증
        run: |
          if (!(Test-Path "output/patch.zip")) {
            Write-Error "patch.zip 생성 실패!"
            exit 1
          }
          Write-Host "검증 통과! patch.zip 존재 확인됨"

      - name: 빌드 결과물 저장
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/patch.zip

      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }}"
          files: output/patch.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ✅ 성공 메일
  notify-success:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: 성공 메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ 빌드 성공 - Release #${{ github.run_number }}"
          to: junghw86@gmail.com, junghw86@naver.com
          from: junghw86@gmail.com
          body: |
            빌드가 성공적으로 완료되었습니다! 🎉

            ━━━━━━━━━━━━━━━━━━━━━━━━
            저장소: ${{ github.repository }}
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.sha }}
            작성자: ${{ github.actor }}
            릴리즈: Release #${{ github.run_number }}
            ━━━━━━━━━━━━━━━━━━━━━━━━

            🔍 결과 확인:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ❌ 실패 메일
  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()

    steps:
      - name: 실패 메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ 빌드 실패 알림 - Run #${{ github.run_number }}"
          to: junghw86@gmail.com, junghw86@naver.com
          from: junghw86@gmail.com
          body: |
            빌드가 실패했습니다. 확인이 필요합니다! 🚨

            ━━━━━━━━━━━━━━━━━━━━━━━━
            저장소: ${{ github.repository }}
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.sha }}
            작성자: ${{ github.actor }}
            ━━━━━━━━━━━━━━━━━━━━━━━━

            🔍 실패 로그 바로 확인:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}