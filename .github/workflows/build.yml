name: GitHub Actions

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4.2.2

      - name: .NET 설치
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: 8.0.x

      - name: 빌드 (로그 저장)
        run: dotnet build TEST/TEST.csproj 2>&1 | Tee-Object -FilePath build.log
        continue-on-error: true

      - name: 빌드 성공 여부 확인
        run: |
          if (Select-String -Path build.log -Pattern "Error") {
            Write-Error "빌드 실패 감지!"
            exit 1
          }

      # ← 여기 추가!
      - name: 유닛 테스트 실행
        run: dotnet test Tests/Tests.csproj --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true

      - name: 테스트 결과 저장
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-results
          path: "**/*.trx"

      - name: 패키지 생성
        run: |
          mkdir output
          Copy-Item -Recurse TEST/bin/Debug/* output/
          Compress-Archive -Path output/* -DestinationPath output/patch.zip

      - name: 패키지 검증
        run: |
          if (!(Test-Path "output/patch.zip")) {
            Write-Error "patch.zip 생성 실패!"
            exit 1
          }
          Write-Host "검증 통과! patch.zip 존재 확인됨"

      - name: 빌드 결과물 저장
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-output
          path: output/patch.zip

      - name: 에러 로그 저장 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build.log

      - name: 릴리즈 생성
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }}"
          files: output/patch.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ✅ 성공 메일
  notify-success:
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: 성공 메일 발송
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ 빌드 성공 - Release #${{ github.run_number }}"
          to: junghw86@gmail.com, junghw86@naver.com
          from: junghw86@gmail.com
          body: |
            빌드 및 테스트가 성공적으로 완료되었습니다! 🎉

            ━━━━━━━━━━━━━━━━━━━━━━━━
            저장소: ${{ github.repository }}
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.sha }}
            작성자: ${{ github.actor }}
            릴리즈: Release #${{ github.run_number }}
            ━━━━━━━━━━━━━━━━━━━━━━━━

            🔍 결과 확인:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ❌ 실패 메일
  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()

    steps:
      - name: 빌드 로그 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-log
        continue-on-error: true

      - name: 에러 로그 읽기
        id: read_log
        run: |
          if [ -f build.log ]; then
            ERROR_LOG=$(grep -i "error" build.log | head -20 || echo "로그 파싱 실패")
            echo "error_log<<EOF" >> $GITHUB_OUTPUT
            echo "$ERROR_LOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "error_log=로그 파일을 찾을 수 없습니다." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: 실패 메일 발송
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ 빌드 실패 알림 - Run #${{ github.run_number }}"
          to: junghw86@gmail.com, junghw86@naver.com
          from: junghw86@gmail.com
          body: |
            빌드 또는 테스트가 실패했습니다! 🚨

            ━━━━━━━━━━━━━━━━━━━━━━━━
            저장소: ${{ github.repository }}
            브랜치: ${{ github.ref_name }}
            커밋: ${{ github.sha }}
            작성자: ${{ github.actor }}
            ━━━━━━━━━━━━━━━━━━━━━━━━

            🔍 에러 내용:
            ${{ steps.read_log.outputs.error_log }}

            📋 전체 로그 확인:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}